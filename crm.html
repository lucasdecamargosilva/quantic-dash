    <!-- fallback pequeno para showToast (evita ReferenceError se utilitário não estiver presente) -->
    <script>
        if (!window.showToast) {
            window.showToast = function(message = '', type = 'info') {
                // Implementação mínima: loga no console e mostra um toast visual simples (se desejar)
                console.debug('[showToast]', type, message);
                // Cria um toast simples e autodestrói para evitar dependência externa
                try {
                    const t = document.createElement('div');
                    t.textContent = message;
                    t.style.position = 'fixed';
                    t.style.right = '20px';
                    t.style.bottom = '20px';
                    t.style.padding = '10px 14px';
                    t.style.background = (type === 'error') ? '#b91c1c' : (type === 'success') ? '#16a34a' : '#111827';
                    t.style.color = 'white';
                    t.style.borderRadius = '8px';
                    t.style.boxShadow = '0 6px 18px rgba(0,0,0,0.4)';
                    t.style.zIndex = 20000;
                    document.body.appendChild(t);
                    setTimeout(() => t.remove(), 3500);
                } catch (e) {
                    // se DOM não estiver pronto, falha silenciosa
                }
            };
            console.debug('[auth] showToast fallback registered');
        }
    </script>

    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        .pipeline-selector {
            display: flex;
            gap: var(--spacing-md);
            background: var(--bg-card);
            padding: 8px;
            border-radius: var(--radius-lg);
            width: fit-content;
            border: 1px solid var(--border-color);
        }

        .pipeline-btn {
            background: transparent;
            border: none;
            color: var(--text-gray);
            padding: 10px 24px;
            border-radius: var(--radius-md);
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .pipeline-btn.active {
            background: var(--primary-purple);
            color: white;
            box-shadow: 0 4px 12px var(--primary-purple-glow);
        }

        .crm-container {
            display: flex;
            gap: var(--spacing-md);
            overflow-x: auto;
            padding-bottom: var(--spacing-lg);
            min-height: calc(100vh - 250px);
            scrollbar-width: thin;
            scrollbar-color: var(--primary-purple) var(--bg-dark);
        }

        .crm-container::-webkit-scrollbar {
            height: 8px;
        }

        .crm-container::-webkit-scrollbar-thumb {
            background: var(--primary-purple);
            border-radius: 4px;
        }

        .crm-column {
            min-width: 280px;
            width: 280px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: var(--radius-lg);
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
            padding: var(--spacing-sm);
            border: 1px solid var(--border-color);
        }

        .column-header {
            padding: var(--spacing-sm);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary-purple);
            margin-bottom: var(--spacing-sm);
        }

        .column-header h3 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-white);
        }

        .opportunity-count {
            background: var(--border-color);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 700;
        }

        .opportunity-list {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-sm);
            flex: 1;
            min-height: 100px;
            max-height: 65vh;
            overflow-y: auto;
            /* Added padding to prevent hover effect border clipping */
            padding: 4px;
            scrollbar-width: thin;
            scrollbar-color: var(--primary-purple) transparent;
        }

        .opportunity-list::-webkit-scrollbar {
            width: 4px;
        }

        .opportunity-list::-webkit-scrollbar-thumb {
            background: var(--primary-purple);
            border-radius: 4px;
        }

        /* Channels Chart Refinement */
        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .channel-card-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            transition: all 0.3s ease;
        }

        .channel-card-item:hover {
            border-color: var(--primary-purple);
            background: rgba(139, 92, 246, 0.05);
            transform: translateY(-4px);
        }

        .channel-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .channel-label {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 15px;
            color: var(--text-white);
        }

        .channel-icon-box {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .channel-count {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-white);
        }

        .channel-bar-bg {
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            overflow: hidden;
        }

        .channel-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 1s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }

        /* Channel Branded Gradients */
        .bg-instagram {
            background: linear-gradient(45deg, #f09433, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888);
        }

        .bg-facebook {
            background: linear-gradient(45deg, #1877F2, #1059b5);
        }

        .bg-linkedin {
            background: linear-gradient(45deg, #0077b5, #005a8a);
        }

        .bg-google {
            background: linear-gradient(45deg, #4285F4, #34A853, #FBBC05, #EA4335);
        }

        .bg-generic {
            background: linear-gradient(45deg, var(--primary-purple), #9333ea);
        }

        .icon-instagram {
            color: #bc1888;
            background: rgba(188, 24, 136, 0.1);
        }

        .icon-facebook {
            color: #1877F2;
            background: rgba(24, 119, 242, 0.1);
        }

        .icon-linkedin {
            color: #0077b5;
            background: rgba(0, 119, 181, 0.1);
        }

        .icon-google {
            color: #FBBC05;
            background: rgba(251, 188, 5, 0.1);
        }

        .icon-generic {
            color: var(--primary-purple);
            background: rgba(139, 92, 246, 0.1);
        }

        .opportunity-card {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.02) 100%);
            border: 1px solid rgba(139, 92, 246, 0.15);
            border-radius: var(--radius-md);
            padding: 20px 16px;
            cursor: grab;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.320, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            gap: 14px;
            min-height: 140px;
        }

        .opportunity-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--primary-purple), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .opportunity-card:hover {
            border-color: rgba(139, 92, 246, 0.4);
            transform: translateY(-6px);
            box-shadow: 0 16px 32px rgba(139, 92, 246, 0.2);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.03) 100%);
        }

        .opportunity-card:hover::before {
            opacity: 1;
        }

        .opportunity-card .client-name {
            font-weight: 700;
            font-size: 15px;
            margin: 0;
            display: block;
            color: var(--text-white);
            letter-spacing: -0.01em;
            line-height: 1.3;
        }

        .opportunity-card .company-name {
            font-size: 12px;
            color: var(--primary-purple);
            margin: 0;
            display: block;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .opportunity-card .card-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            padding: 6px 0;
            font-weight: 600;
            margin-top: 4px;
        }

        .opportunity-card .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 8px 0 0 0;
            min-height: 20px;
        }

        .opportunity-card .tag {
            font-size: 10px;
            font-weight: 700;
            padding: 3px 9px;
            border-radius: 4px;
            background: var(--primary-purple);
            color: white;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .opportunity-card .responsible-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--text-gray);
            margin-top: auto;
            padding-top: 12px;
            border-top: 1px solid rgba(139, 92, 246, 0.1);
        }

        .opportunity-card .responsible-badge i {
            font-size: 14px;
        }

        .opportunity-card.dragging {
            opacity: 0.5;
            cursor: grabbing;
        }

        .opportunity-list.drag-over {
            background: rgba(139, 92, 246, 0.05);
            border-radius: var(--radius-md);
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            /* Super high z-index */
            animation: fadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            width: 90%;
            max-width: 1100px;
            height: 85vh;
            border-radius: var(--radius-xl);
            position: relative;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: transparent;
            border: none;
            color: var(--text-gray);
            font-size: 24px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .modal-close:hover {
            color: white;
        }

        .modal-header {
            margin-bottom: var(--spacing-lg);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: var(--spacing-md);
        }

        .modal-header h2 {
            font-size: 24px;
            margin-bottom: 4px;
        }

        .modal-header .company {
            color: var(--primary-purple);
            font-weight: 600;
        }

        .details-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: var(--spacing-lg);
        }

        .detail-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .detail-label {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .detail-value {
            font-size: 15px;
            font-weight: 500;
        }

        .full-width {
            grid-column: span 2;
        }

        /* Responsible & Tags Styles */
        .responsible-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 12px;
            padding-top: 8px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 8px;
        }

        .tag {
            font-size: 9px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 4px;
            background: var(--primary-purple);
            color: white;
            text-transform: uppercase;
        }

        /* Updated Modal Layout - Split View */
        .modal-body-split {
            display: grid;
            grid-template-columns: 280px 1fr;
            height: calc(100% - 70px);
            /* Subtract header height */
            overflow: hidden;
        }

        .modal-sidebar {
            background: rgba(255, 255, 255, 0.01);
            border-right: 1px solid var(--border-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            overflow-y: auto;
        }

        .modal-main-area {
            padding: 24px;
            overflow-y: auto;
            position: relative;
        }

        /* Sidebar Elements */
        .sidebar-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .sidebar-label {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .contact-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.03);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .contact-val {
            font-size: 13px;
            color: var(--text-white);
            font-weight: 500;
        }

        .copy-btn-mini {
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.2s;
        }

        .copy-btn-mini:hover {
            color: var(--primary-purple);
        }

        .crm-input-compact {
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 8px 10px;
            color: white;
            font-size: 13px;
            width: 100%;
            transition: border-color 0.2s;
        }

        .crm-input-compact:focus {
            border-color: var(--primary-purple);
            outline: none;
        }

        .save-btn-sidebar {
            margin-top: auto;
            background: var(--primary-purple);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        .save-btn-sidebar:hover {
            background: var(--primary-purple-hover, #7c3aed);
        }

        /* Compact AI Grid */
        .ai-grid-compact {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .ai-full-row {
            grid-column: span 2;
        }

        .ai-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 16px;
            transition: all 0.3s ease;
        }

        .ai-box:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }

        /* Enhanced Table Styles */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: var(--spacing-lg);
        }

        .data-table th,
        .data-table td {
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: left;
            font-size: 14px;
        }

        .data-table th {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
        }

        .data-table tr {
            transition: background 0.2s;
        }

        .data-table tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        /* Tooltip Styles */
        .tooltip {
            position: relative;
            display: inline-block;
            cursor: pointer;
        }

        .tooltip .tooltip-text {
            visibility: hidden;
            width: 120px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            text-align: center;
            border-radius: 6px;
            padding: 8px;
            position: absolute;
            z-index: 100;
            bottom: 125%;
            left: 50%;
            margin-left: -60px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .tooltip:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
        }

        /* Button Styles */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
        }

        .btn-primary {
            background: var(--primary-purple);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-purple-hover, #7c3aed);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-gray);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        /* Card Styles */
        .info-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 24px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .info-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }

        .info-card .card-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--text-white);
        }

        .info-card .card-subtitle {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 16px;
            color: var(--text-muted);
        }

        .info-card .card-content {
            font-size: 15px;
            color: var(--text-white);
            line-height: 1.6;
        }

        /* Badge Styles */
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            margin-right: 8px;
        }

        .badge-primary {
            background: var(--primary-purple);
            color: white;
        }

        .badge-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-gray);
        }

        /* Avatar Styles */
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            overflow: hidden;
            display: inline-block;
            position: relative;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar.online::after {
            content: '';
            position: absolute;
            width: 10px;
            height: 10px;
            background: #4caf50;
            border-radius: 50%;
            bottom: 4px;
            right: 4px;
        }

        .avatar.offline::after {
            content: '';
            position: absolute;
            width: 10px;
            height: 10px;
            background: #f44336;
            border-radius: 50%;
            bottom: 4px;
            right: 4px;
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        .form-control {
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px 12px;
            color: var(--text-white);
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .form-control:focus {
            border-color: var(--primary-purple);
            outline: none;
        }
    </style>
</head>

<body>

                </button>
            </div>

                    <span class="link-text">CRM Quantic</span>

            </div>

        <div class="main-content">
            <div class="app-container">
                <!-- Header -->
                <header class="main-header">
                    <div class="header-left">
                        <h1 class="page-title">CRM Quantic</h1>
                    </div>

                    <div class="board-controls">
                        <div class="search-wrapper">
                            <i class="ph-fill ph-magnifying-glass search-icon"></i>
                            <input type="text" class="search-input" placeholder="Buscar oportunidades...">
                        </div>
                        <select class="filter-select">

                    <div class="user-area">
                        <button class="icon-btn"><i class="ph-fill ph-bell"></i></button>
                    </div>
                </header>

                <!-- Main Content -->
                <main class="dashboard-grid">
                    <!-- Pipeline Selector -->
                    <div style="grid-column: 1 / -1; margin-bottom: var(--spacing-lg);">
                        <div class="pipeline-selector">
                            <button class="pipeline-btn active" data-pipeline="Quantic Starter">
                                <i class="ph-fill ph-rocket-launch"></i> Quantic Starter
                            </button>
                            <button class="pipeline-btn" data-pipeline="Quantic Growth">
                                <i class="ph-fill ph-trending-up"></i> Quantic Growth
                            </button>
                            <button class="pipeline-btn" data-pipeline="Quantic Enterprise">
                                <i class="ph-fill ph-crown"></i> Quantic Enterprise
                            </button>
                        </div>
                    </div>

                    <!-- CRM Board -->
                    <div style="grid-column: 1 / -1;">
                        <div class="crm-container" id="crmBoard">
                            <!-- Columns will be generated by JavaScript -->
                        </div>
                    </div>

                    <!-- Summary Dashboard -->
                    <div style="grid-column: 1 / -1; margin-top: var(--spacing-xl);">
                        <div class="crm-summary" id="crmSummary">
                            <!-- Summary cards will be generated by JavaScript -->
                        </div>
                    </div>

                    <!-- Pipeline Charts -->
                    <div style="grid-column: 1 / -1;">
                        <div class="pipeline-charts-grid" id="pipelineCharts">
                            <!-- Charts will be generated by JavaScript -->
                        </div>
                    </div>
                </main>

                <footer class="main-footer">
                    <div class="footer-logo">
                        <i class="ph-fill ph-squares-four"></i> <span>Quantic</span>
                    </div>
                    <p>© 2024 Quantic Fin. Todos os direitos reservados.</p>
                </footer>
            </div>
        </div>
    </div>

    <!-- Modal para detalhes da oportunidade -->
    <div class="modal-overlay" id="opportunityModal">
        <div class="modal-content">
            <button class="modal-close" id="closeModal">&times;</button>
            <div class="modal-body-full" id="modalBody">
                <!-- Conteúdo será preenchido por JavaScript -->
            </div>
        </div>
    </div>

    <!-- Supabase Integration -->
    <!-- Supabase + CRM logic (não duplicar inclusões já no head) -->
    <script src="supabase-logic.js?v=2"></script>
    <script src="crm-logic.js"></script>
    <script>
        (async function CRM_AutoInit_and_Logger() {
            // Espera CRM_LOGIC disponível
            let tries = 0;
            while ((!window.CRM_LOGIC || !window.CRM_LOGIC.initCrmSupabase) && tries < 50) {
                await new Promise(r => setTimeout(r, 100));
                tries++;
            }
            if (!window.CRM_LOGIC) {
                console.error('[CRM-AUTO] CRM_LOGIC não disponível after wait');
                return;
            }

            console.debug('[CRM-AUTO] iniciando initCrmSupabase...');
            try {
                const ok = await window.CRM_LOGIC.initCrmSupabase();
                if (!ok) {
                    console.error('[CRM-AUTO] Falha ao inicializar Supabase');
                    return;
                }
                console.debug('[CRM-AUTO] Supabase inicializado');

                // Função utilitária para gerar cards de resumo simples
                function renderSummary(summary) {
                    console.debug('[CRM-AUTO] renderSummary:', summary);
                    const el = document.getElementById('crmSummary');
                    if (!el) return;
                    el.innerHTML = '';
                    const createCard = (label, value) => {
                        const d = document.createElement('div');
                        d.className = 'summary-card';
                        d.innerHTML = `<div class="summary-icon">${label[0]}</div>
					<div class="summary-info"><h3>${label}</h3><div class="value">${value}</div></div>`;
                        return d;
                    };
                    el.appendChild(createCard('Starter', summary.total?.starter || 0));
                    el.appendChild(createCard('Growth', summary.total?.growth || 0));
                    el.appendChild(createCard('Enterprise', summary.total?.enterprise || 0));
                }

                // Função utilitária para renderizar board (columns)
                function renderBoard(items) {
                    console.debug('[CRM-AUTO] renderBoard items count:', items.length);
                    const board = document.getElementById('crmBoard');
                    if (!board) return;
                    board.innerHTML = '';
                    const stages = {};
                    items.forEach(i => {
                        const s = i.stage || 'Sem Etapa';
                        (stages[s] = stages[s] || []).push(i);
                    });
                    Object.keys(stages).forEach(stage => {
                        const col = document.createElement('div');
                        col.className = 'crm-column';
                        col.innerHTML = `<div class="column-header"><h3>${stage}</h3><div class="opportunity-count">${stages[stage].length}</div></div>`;
                        const list = document.createElement('div');
                        list.className = 'opportunity-list';
                        stages[stage].forEach(op => {
                            const card = document.createElement('div');
                            card.className = 'opportunity-card';
                            card.innerHTML = `
						<div>
							<span class="client-name">${op.name || 'Sem Nome'}</span>
							<span class="company-name">${op.company || 'Sem Empresa'}</span>
						</div>
						<div class="tags-container">${(op.tags || []).map(t => `<span class="tag">${t}</span>`).join('')}</div>
						<div class="responsible-badge"><i class="ph-fill ph-user"></i> ${op.responsible || 'Não atribuído'}</div>
					`;
                            list.appendChild(card);
                        });
                        col.appendChild(list);
                        board.appendChild(col);
                    });
                }

                // Função utilitária para renderizar charts simples a partir do summary
                function renderCharts(summary) {
                    console.debug('[CRM-AUTO] renderCharts:', summary);
                    const el = document.getElementById('pipelineCharts');
                    if (!el) return;
                    el.innerHTML = '';
                    const stages = summary.stages || {};
                    ['starter', 'growth', 'enterprise'].forEach(pipe => {
                        const card = document.createElement('div');
                        card.className = 'chart-card';
                        let html = `<div class="chart-header">${pipe.toUpperCase()}</div>`;
                        const sObj = stages[pipe] || {};
                        const total = Object.values(sObj).reduce((a, b) => a + b, 0) || 1;
                        Object.keys(sObj).forEach(stageName => {
                            const cnt = sObj[stageName];
                            const pct = Math.round((cnt / total) * 100);
                            html += `<div class="chart-row">
						<div class="chart-stage-name">${stageName}</div>
						<div class="chart-bar-bg"><div class="chart-bar-fill" style="width:${pct}%"></div></div>
						<div class="chart-count">${cnt}</div>
					</div>`;
                        });
                        card.innerHTML = html;
                        el.appendChild(card);
                    });
                }

                // Carrega summary e dados iniciais (pipeline "starter")
                const summary = await window.CRM_LOGIC.fetchPipelineSummary();
                console.debug('[CRM-AUTO] fetchPipelineSummary ->', summary);
                renderSummary(summary);
                renderCharts(summary);

                // Escolhe pipeline inicial (starter)
                const pipelineKey = 'starter';
                let items = await window.CRM_LOGIC.fetchCrmData(pipelineKey);
                console.debug(`[CRM-AUTO] fetchCrmData("${pipelineKey}") ->`, items);
                renderBoard(items);

                // Recarrega e renderiza sob demanda (real-time)
                const reloadAndRender = async () => {
                    try {
                        console.debug('[CRM-AUTO] reloadAndRender acionado');
                        const newSummary = await window.CRM_LOGIC.fetchPipelineSummary();
                        console.debug('[CRM-AUTO] novo summary ->', newSummary);
                        renderSummary(newSummary);
                        renderCharts(newSummary);
                        const newItems = await window.CRM_LOGIC.fetchCrmData(pipelineKey);
                        console.debug('[CRM-AUTO] novos items ->', newItems);
                        renderBoard(newItems);
                    } catch (e) {
                        console.error('[CRM-AUTO] erro reloadAndRender', e);
                    }
                };

                // Inscreve-se em mudanças realtime fornecidas pelo módulo CRM
                if (window.CRM_LOGIC.subscribeToCrmChanges) {
                    window.CRM_LOGIC.subscribeToCrmChanges(() => {
                        console.debug('[CRM-AUTO] realtime change detected, atualizando...');
                        reloadAndRender();
                    });
                    console.debug('[CRM-AUTO] inscrito em realtime changes');
                } else {
                    console.warn('[CRM-AUTO] subscribeToCrmChanges não disponível');
                }

                console.debug('[CRM-AUTO] inicialização e render concluídos com sucesso.');
            } catch (err) {
                console.error('[CRM-AUTO] Erro na inicialização automática:', err);
            }
        })();
    </script>
</body>

</html>
