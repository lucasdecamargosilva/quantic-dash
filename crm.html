<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantic CRM</title>

    <!-- Favicons / theme -->
    <link rel="icon" href="favicon.png" type="image/png" sizes="32x32">
    <link rel="icon" href="favicon.png" type="image/png" sizes="16x16">
    <link rel="apple-touch-icon" href="favicon.png" sizes="180x180">
    <meta name="theme-color" content="#8b5cf6">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Supabase Core & Configuration (MUST BE IN HEAD) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="auth.js"></script>

    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        .pipeline-selector {
            display: flex;
            gap: var(--spacing-md);
            background: var(--bg-card);
            padding: 8px;
            border-radius: var(--radius-lg);
            width: fit-content;
            border: 1px solid var(--border-color);
        }

        .pipeline-btn {
            background: transparent;
            border: none;
            color: var(--text-gray);
            padding: 10px 24px;
            border-radius: var(--radius-md);
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .pipeline-btn.active {
            background: var(--primary-purple);
            color: white;
            box-shadow: 0 4px 12px var(--primary-purple-glow);
        }

        .crm-container {
            display: flex;
            gap: var(--spacing-md);
            overflow-x: auto;
            padding-bottom: var(--spacing-lg);
            min-height: calc(100vh - 250px);
            scrollbar-width: thin;
            scrollbar-color: var(--primary-purple) var(--bg-dark);
        }

        .crm-container::-webkit-scrollbar {
            height: 8px;
        }

        .crm-container::-webkit-scrollbar-thumb {
            background: var(--primary-purple);
            border-radius: 4px;
        }

        .crm-column {
            min-width: 280px;
            width: 280px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: var(--radius-lg);
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
            padding: var(--spacing-sm);
            border: 1px solid var(--border-color);
        }

        .column-header {
            padding: var(--spacing-sm);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary-purple);
            margin-bottom: var(--spacing-sm);
        }

        .column-header h3 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-white);
        }

        .opportunity-count {
            background: var(--border-color);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 700;
        }

        .opportunity-list {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-sm);
            flex: 1;
            min-height: 100px;
            max-height: 65vh;
            overflow-y: auto;
            /* Added padding to prevent hover effect border clipping */
            padding: 4px;
            scrollbar-width: thin;
            scrollbar-color: var(--primary-purple) transparent;
        }

        .opportunity-list::-webkit-scrollbar {
            width: 4px;
        }

        .opportunity-list::-webkit-scrollbar-thumb {
            background: var(--primary-purple);
            border-radius: 4px;
        }

        /* Channels Chart Refinement */
        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .channel-card-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            transition: all 0.3s ease;
        }

        .channel-card-item:hover {
            border-color: var(--primary-purple);
            background: rgba(139, 92, 246, 0.05);
            transform: translateY(-4px);
        }

        .channel-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .channel-label {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 15px;
            color: var(--text-white);
        }

        .channel-icon-box {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .channel-count {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-white);
        }

        .channel-bar-bg {
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            overflow: hidden;
        }

        .channel-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 1s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }

        /* Channel Branded Gradients */
        .bg-instagram {
            background: linear-gradient(45deg, #f09433, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888);
        }

        .bg-facebook {
            background: linear-gradient(45deg, #1877F2, #1059b5);
        }

        .bg-linkedin {
            background: linear-gradient(45deg, #0077b5, #005a8a);
        }

        .bg-google {
            background: linear-gradient(45deg, #4285F4, #34A853, #FBBC05, #EA4335);
        }

        .bg-generic {
            background: linear-gradient(45deg, var(--primary-purple), #9333ea);
        }

        .icon-instagram {
            color: #bc1888;
            background: rgba(188, 24, 136, 0.1);
        }

        .icon-facebook {
            color: #1877F2;
            background: rgba(24, 119, 242, 0.1);
        }

        .icon-linkedin {
            color: #0077b5;
            background: rgba(0, 119, 181, 0.1);
        }

        .icon-google {
            color: #FBBC05;
            background: rgba(251, 188, 5, 0.1);
        }

        .icon-generic {
            color: var(--primary-purple);
            background: rgba(139, 92, 246, 0.1);
        }

        .opportunity-card {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.02) 100%);
            border: 1px solid rgba(139, 92, 246, 0.15);
            border-radius: var(--radius-md);
            padding: 20px 16px;
            cursor: grab;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.320, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            gap: 14px;
            min-height: 140px;
        }

        .opportunity-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--primary-purple), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .opportunity-card:hover {
            border-color: rgba(139, 92, 246, 0.4);
            transform: translateY(-6px);
            box-shadow: 0 16px 32px rgba(139, 92, 246, 0.2);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.03) 100%);
        }

        .opportunity-card:hover::before {
            opacity: 1;
        }

        .opportunity-card .client-name {
            font-weight: 700;
            font-size: 15px;
            margin: 0;
            display: block;
            color: var(--text-white);
            letter-spacing: -0.01em;
            line-height: 1.3;
        }

        .opportunity-card .company-name {
            font-size: 12px;
            color: var(--primary-purple);
            margin: 0;
            display: block;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .opportunity-card .card-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            padding: 6px 0;
            font-weight: 600;
            margin-top: 4px;
        }

        .opportunity-card .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 8px 0 0 0;
            min-height: 20px;
        }

        .opportunity-card .tag {
            font-size: 10px;
            font-weight: 700;
            padding: 3px 9px;
            border-radius: 4px;
            background: var(--primary-purple);
            color: white;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .opportunity-card .responsible-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--text-gray);
            margin-top: auto;
            padding-top: 12px;
            border-top: 1px solid rgba(139, 92, 246, 0.1);
        }

        .opportunity-card .responsible-badge i {
            font-size: 14px;
        }

        .opportunity-card.dragging {
            opacity: 0.5;
            cursor: grabbing;
        }

        .opportunity-list.drag-over {
            background: rgba(139, 92, 246, 0.05);
            border-radius: var(--radius-md);
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            /* Super high z-index */
            animation: fadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            width: 90%;
            max-width: 1100px;
            height: 85vh;
            border-radius: var(--radius-xl);
            position: relative;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: transparent;
            border: none;
            color: var(--text-gray);
            font-size: 24px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .modal-close:hover {
            color: white;
        }

        .modal-header {
            margin-bottom: var(--spacing-lg);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: var(--spacing-md);
        }

        .modal-header h2 {
            font-size: 24px;
            margin-bottom: 4px;
        }

        .modal-header .company {
            color: var(--primary-purple);
            font-weight: 600;
        }

        .details-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: var(--spacing-lg);
        }

        .detail-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .detail-label {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .detail-value {
            font-size: 15px;
            font-weight: 500;
        }

        .full-width {
            grid-column: span 2;
        }

        /* Responsible & Tags Styles */
        .responsible-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 12px;
            padding-top: 8px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 8px;
        }

        .tag {
            font-size: 9px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 4px;
            background: var(--primary-purple);
            color: white;
            text-transform: uppercase;
        }

        /* Updated Modal Layout - Split View */
        .modal-body-split {
            display: grid;
            grid-template-columns: 280px 1fr;
            height: calc(100% - 70px);
            /* Subtract header height */
            overflow: hidden;
        }

        .modal-sidebar {
            background: rgba(255, 255, 255, 0.01);
            border-right: 1px solid var(--border-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            overflow-y: auto;
        }

        .modal-main-area {
            padding: 24px;
            overflow-y: auto;
            position: relative;
        }

        /* Sidebar Elements */
        .sidebar-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .sidebar-label {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .contact-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.03);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .contact-val {
            font-size: 13px;
            color: var(--text-white);
            font-weight: 500;
        }

        .copy-btn-mini {
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.2s;
        }

        .copy-btn-mini:hover {
            color: var(--primary-purple);
        }

        .crm-input-compact {
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 8px 10px;
            color: white;
            font-size: 13px;
            width: 100%;
            transition: border-color 0.2s;
        }

        .crm-input-compact:focus {
            border-color: var(--primary-purple);
            outline: none;
        }

        .save-btn-sidebar {
            margin-top: auto;
            background: var(--primary-purple);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        .save-btn-sidebar:hover {
            background: var(--primary-purple-hover, #7c3aed);
        }

        /* Compact AI Grid */
        .ai-grid-compact {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .ai-full-row {
            grid-column: span 2;
        }

        .ai-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 16px;
        }

        .ai-label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            color: var(--primary-purple);
            font-weight: 700;
            margin-bottom: 8px;
        }

        .ai-content {
            font-size: 13px;
            line-height: 1.5;
            color: var(--text-gray);
        }

        .ai-insight {
            background: rgba(139, 92, 246, 0.08);
            /* Purple tint */
            border-color: rgba(139, 92, 246, 0.2);
        }

        .ai-insight .ai-content {
            color: #E9D5FF;
        }

        /* Card Status Pill */
        .card-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            padding: 4px 0;
            font-weight: 600;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .status-hot {
            color: #4ade80;
        }

        .dot-hot {
            background: #4ade80;
            box-shadow: 0 0 8px rgba(74, 222, 128, 0.4);
        }

        .status-warm {
            color: #fbbf24;
        }

        .dot-warm {
            background: #fbbf24;
            box-shadow: 0 0 8px rgba(251, 191, 36, 0.4);
        }

        .status-cold {
            color: #9ca3af;
        }

        .dot-cold {
            background: #9ca3af;
        }

        .modal-header-compact {
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid var(--border-color);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-profile {
            display: flex;
            align-items: baseline;
            gap: 12px;
        }

        .header-profile h2 {
            font-size: 20px;
            font-weight: 700;
            margin: 0;
            color: var(--text-white);
        }

        .header-profile .company {
            color: var(--primary-purple);
            font-size: 14px;
            font-weight: 600;
        }

        .header-contact-info {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .contact-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            color: var(--text-gray);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .contact-badge i.copy-icon {
            cursor: pointer;
            color: var(--text-muted);
            transition: color 0.2s;
        }

        .contact-badge i.copy-icon:hover {
            color: var(--primary-purple);
        }

        .header-crm-controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 120px;
            gap: 12px;
            align-items: end;
        }

        .crm-input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .crm-input-group label {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 700;
        }

        .crm-header-input {
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 6px 10px;
            color: white;
            font-family: inherit;
            font-size: 13px;
            width: 100%;
        }

        .crm-header-input:focus {
            border-color: var(--primary-purple);
            outline: none;
        }

        .modal-body-full {
            flex: 1;
            overflow-y: auto;
            /* Scroll only the body */
            padding: var(--spacing-lg);
            background: var(--bg-card);
        }

        /* AI Section Updates for full body usage */
        .ia-section-full {
            height: 100%;
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
        }

        .ia-grid-full {
            display: grid;
            grid-template-columns: 1fr 2fr;
            /* 2 columns layout for AI data */
            gap: var(--spacing-lg);
        }

        .ia-full-width-col {
            grid-column: span 2;
        }

        .section-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--primary-purple);
            margin-bottom: var(--spacing-lg);
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .ia-grid {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-lg);
        }

        .ia-insight-box {
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.2);
            padding: 12px;
            border-radius: var(--radius-md);
            font-size: 13px;
            color: #d8b4fe;
            line-height: 1.5;
        }

        .ia-text {
            font-size: 13px;
            color: var(--text-gray);
            line-height: 1.4;
        }

        .ia-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .ia-list span {
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            color: var(--text-white);
        }

        .modal-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 8px 12px;
            color: white;
            font-family: inherit;
        }

        .modal-input:focus {
            border-color: var(--primary-purple);
            outline: none;
        }

        .save-btn {
            background: var(--primary-purple);
            color: white;
            border: none;
            padding: 12px;
            border-radius: var(--radius-md);
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: var(--spacing-lg);
            transition: opacity 0.2s;
        }

        .save-btn:hover {
            opacity: 0.9;
        }

        /* Summary Dashboard */
        .crm-summary {
            margin-top: 48px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--spacing-lg);
        }

        .summary-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            display: flex;
            align-items: center;
            gap: var(--spacing-lg);
            transition: transform 0.2s;
        }

        .summary-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary-purple);
        }

        .summary-icon {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .summary-icon.starter {
            background: rgba(139, 92, 246, 0.1);
            color: var(--primary-purple);
        }

        .summary-icon.growth {
            background: rgba(16, 185, 129, 0.1);
            color: var(--secondary-green);
        }

        .summary-icon.enterprise {
            background: rgba(217, 70, 239, 0.1);
            color: var(--accents-pink);
        }

        .summary-info {
            display: flex;
            flex-direction: column;
        }

        .summary-label {
            font-size: 13px;
            color: var(--text-gray);
            font-weight: 500;
        }

        .summary-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-white);
        }

        /* Horizontal Bar Charts */
        .pipeline-charts-grid {
            margin-top: var(--spacing-md);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--spacing-lg);
        }

        .chart-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
        }

        .chart-header {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: var(--spacing-lg);
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .chart-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .chart-stage-name {
            width: 100px;
            font-size: 10px;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chart-bar-bg {
            flex: 1;
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .chart-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            width: 0;
            /* Animated */
        }

        .chart-count {
            width: 20px;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-white);
            text-align: right;
        }

        /* Pipeline specific bar colors */
        .bar-starter {
            background: var(--primary-purple);
            box-shadow: 0 0 10px var(--primary-purple-glow);
        }

        .bar-growth {
            background: var(--secondary-green);
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.3);
        }

        .bar-enterprise {
            background: var(--accents-pink);
            box-shadow: 0 0 10px rgba(217, 70, 239, 0.3);
        }

        .label-starter {
            color: var(--primary-purple);
        }

        .label-growth {
            color: var(--secondary-green);
        }

        .label-enterprise {
            color: var(--accents-pink);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        /* Prize Card Styles */
        .prize-card {
            background: linear-gradient(135deg, #1e1e2d 0%, #151522 100%);
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            display: flex;
            align-items: center;
            gap: var(--spacing-xl);
            position: relative;
            overflow: hidden;
        }

        .highlight-card {
            background: linear-gradient(145deg, rgba(139, 92, 246, 0.05) 0%, rgba(255, 255, 255, 0.02) 100%);
            border: 1px solid rgba(139, 92, 246, 0.2) !important;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .highlight-card:hover {
            transform: translateY(-5px);
            border-color: rgba(139, 92, 246, 0.4) !important;
            box-shadow: 0 20px 40px rgba(139, 92, 246, 0.1);
        }
    </style>
</head>
